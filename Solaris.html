<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Samanyolu | Uzay Yolculuğu</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Syncopate:wght@400;700&family=Inter:wght@100;200;400&display=swap');

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: #000;
            overflow: hidden;
            color: white;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        #c {
            position: absolute;
            inset: 0;
            z-index: 1;
        }

        #ui-overlay {
            position: absolute;
            inset: 0;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            padding: 50px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: auto;
        }

        .logo {
            font-family: 'Syncopate', sans-serif;
            letter-spacing: 0.8em;
            font-size: 10px;
            opacity: 0.4;
        }

        .control-panel {
            background: rgba(255, 255, 255, 0.02);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            padding: 20px;
            border-radius: 12px;
            width: 200px;
            pointer-events: auto;
            transition: 0.5s;
            opacity: 0.3;
        }

            .control-panel:hover {
                opacity: 1;
            }

        .control-group label {
            display: block;
            font-size: 8px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-bottom: 8px;
            color: #666;
        }

        input[type="range"] {
            width: 100%;
            -webkit-appearance: none;
            background: rgba(255,255,255,0.05);
            height: 1px;
            outline: none;
        }

            input[type="range"]::-webkit-slider-thumb {
                -webkit-appearance: none;
                width: 8px;
                height: 8px;
                background: #fff;
                border-radius: 50%;
                cursor: pointer;
            }

        .info-panel {
            position: absolute;
            left: 60px;
            top: 50%;
            transform: translateY(-50%);
            width: 280px;
            z-index: 15;
        }

        #pinfo {
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.01);
            backdrop-filter: blur(40px);
            border-radius: 10px;
            border-left: 1px solid rgba(255, 255, 255, 0.1);
        }

        .data-line {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            padding-bottom: 8px;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
        }

        .data-label {
            color: rgba(255, 255, 255, 0.4);
            font-weight: 200;
        }

        .data-value {
            color: rgba(255, 255, 255, 0.9);
            font-weight: 400;
        }

        .name-container {
            position: absolute;
            bottom: 10vh;
            left: 50%;
            transform: translateX(-50%);
            text-align: center;
            z-index: 15;
            width: 100%;
        }

        #pname {
            font-family: 'Syncopate', sans-serif;
            font-size: 5vw;
            font-weight: 400;
            margin: 0;
            letter-spacing: 1em;
            background: linear-gradient(to bottom, #fff 0%, rgba(255,255,255,0.2) 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .scroll-hint {
            margin-top: 30px;
            opacity: 0.2;
        }
    </style>
</head>
<body>
    <canvas id="c"></canvas>
    <div id="ui-overlay">
        <div class="header">
            <div class="logo">SOLARİS ARŞİVİ</div>
            <div class="control-panel">
                <div class="control-group"><label>Ölçek</label><input type="range" id="scaleRange" min="1" max="15" step="0.1" value="1.5"></div>
                <div class="control-group"><label>Ufuk</label><input type="range" id="yRange" min="-15" max="5" step="0.1" value="0"></div>
                <div class="control-group"><label>Işıma</label><input type="range" id="glowRange" min="1.01" max="1.3" step="0.005" value="1.08"></div>
            </div>
        </div>

        <div class="info-panel">
            <div id="pinfo"></div>
        </div>

        <div class="name-container">
            <h1 id="pname"></h1>
            <div class="scroll-hint">
                <p style="letter-spacing: 0.8em; font-size: 8px; margin: 0; font-weight: 200;">KEŞFETMEK İÇİN KAYDIRIN</p>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.9.1/gsap.min.js"></script>

    <script>
        const SCENES = [
            { name: 'GÜNEŞ', data: { Tip: 'Yıldız', Sıcaklık: '5,500°C', Kütle: '333,000 Dünya', Yaş: '4.6 Milyar Yıl' }, texture: 'img/sun.jpg', color: '#ffcc33' },
            { name: 'MERKÜR', data: { Tip: 'Karasal', Mesafe: '58M km', Gün: '59 Dünya Günü', Sıcaklık: '430°C' }, texture: 'img/mercury.jpg', color: '#999999' },
            { name: 'VENÜS', data: { Tip: 'Karasal', Basınç: '90 ATM', Gün: '243 Dünya Günü', Sıcaklık: '462°C' }, texture: 'img/venus.jpg', color: '#e3bb76' },
            { name: 'DÜNYA', data: { Tip: 'Yaşam', Nüfus: '8 Milyar+', Uydu: 'Ay', Su: '%71' }, texture: 'img/earth.jpg', color: '#2277ff' },
            { name: 'MARS', data: { Tip: 'Kızıl', Uydu: '2 Adet', Dağ: 'Olympus Mons', Yıl: '687 Gün' }, texture: 'img/Mars.jpg', color: '#ff4422' },
            { name: 'JÜPİTER', data: { Tip: 'Gaz Devi', Uydu: '95 Adet', Hız: '45,300 km/s', Hacim: '1,321 Dünya' }, texture: 'img/jupiter.jpg', color: '#d39c7e' },
            { name: 'SATÜRN', data: { Tip: 'Gaz Devi', Uydu: '146 Adet', Halka: 'Buz/Kaya', Gün: '10.7 Saat' }, texture: 'img/SATURN.jpg', ringTexture: 'img/saturnring.png', color: '#c5ab6e' },
            { name: 'URANÜS', data: { Tip: 'Buz Devi', Eksen: '98 Derece', Yıl: '84 Dünya Yılı', Sıcaklık: '-224°C' }, texture: 'img/uranus.jpg', color: '#afeeee' },
            { name: 'NEPTÜN', data: { Tip: 'Buz Devi', Mesafe: '4.5B km', Rüzgar: '2,100 km/s', Yıl: '165 Dünya Yılı' }, texture: 'img/neptune.jpg', color: '#4169e1' }
        ];

        let current = 0;
        let isAnimating = false;
        const planetGroups = [];

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(40, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 8.5);

        const renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('c'), antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

        const loader = new THREE.TextureLoader();

        const atmosShader = {
            vertex: `varying vec3 vNormal; void main() { vNormal = normalize(normalMatrix * normal); gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0); }`,
            fragment: `varying vec3 vNormal; uniform vec3 color; uniform float opacity; void main() { float intensity = pow(0.7 - dot(vNormal, vec3(0,0,1.0)), 6.0); gl_FragColor = vec4(color, intensity * opacity); }`
        };

        function updateInfo(index) {
            const container = document.getElementById('pinfo');
            container.innerHTML = '';
            const planet = SCENES[index];
            Object.entries(planet.data).forEach(([key, val]) => {
                const row = document.createElement('div');
                row.className = 'data-line';
                row.innerHTML = `<span class="data-label">${key}</span><span class="data-value">${val}</span>`;
                container.appendChild(row);
            });
            document.getElementById('pname').innerText = planet.name;
        }

        SCENES.forEach((data, i) => {
            const group = new THREE.Group();
            const geo = new THREE.SphereGeometry(2, 64, 64);

            const mat = new THREE.MeshStandardMaterial({
                map: loader.load(data.texture),
                transparent: true,
                opacity: i === 0 ? 1 : 0,
                depthWrite: false
            });
            const mesh = new THREE.Mesh(geo, mat);
            mesh.name = "planet_body";
            mesh.renderOrder = 2;
            group.add(mesh);

            if (data.ringTexture) {
                const ringGeo = new THREE.RingGeometry(2.3, 4.2, 128);
                const pos = ringGeo.attributes.position;
                const uv = ringGeo.attributes.uv;
                for (let j = 0; j < pos.count; j++) {
                    const vertex = new THREE.Vector3().fromBufferAttribute(pos, j);
                    const distance = vertex.length();
                    const u = (distance - 2.3) / (4.2 - 2.3);
                    uv.setXY(j, u, 1);
                }

                const ringTex = loader.load(data.ringTexture);
                const ringMat = new THREE.MeshBasicMaterial({
                    map: ringTex,
                    side: THREE.DoubleSide,
                    transparent: true,
                    opacity: i === 0 ? 1 : 0,
                    depthWrite: false,
                    blending: THREE.AdditiveBlending
                });

                const ring = new THREE.Mesh(ringGeo, ringMat);
                ring.rotation.x = Math.PI / 2.2;
                ring.name = "planet_ring";
                ring.renderOrder = 3;
                group.add(ring);
            }

            const gMat = new THREE.ShaderMaterial({
                vertexShader: atmosShader.vertex,
                fragmentShader: atmosShader.fragment,
                side: THREE.BackSide,
                transparent: true,
                blending: THREE.AdditiveBlending,
                depthWrite: false,
                uniforms: {
                    color: { value: new THREE.Color(data.color) },
                    opacity: { value: i === 0 ? 0.4 : 0.0 }
                }
            });
            const glow = new THREE.Mesh(geo, gMat);
            glow.scale.set(1.08, 1.08, 1.08);
            glow.name = "planet_glow";
            glow.renderOrder = 1;
            group.add(glow);

            group.scale.set(1.5, 1.5, 1.5);
            group.visible = i === 0;
            scene.add(group);
            planetGroups.push(group);
        });

        const light = new THREE.DirectionalLight(0xffffff, 1.5);
        light.position.set(5, 5, 5);
        scene.add(light);
        scene.add(new THREE.AmbientLight(0xffffff, 0.3));

        document.getElementById('scaleRange').oninput = (e) => planetGroups.forEach(g => g.scale.set(e.target.value, e.target.value, e.target.value));
        document.getElementById('yRange').oninput = (e) => planetGroups.forEach(g => g.position.y = e.target.value);
        document.getElementById('glowRange').oninput = (e) => {
            planetGroups.forEach(g => {
                const glow = g.children.find(c => c.name === "planet_glow");
                if (glow) glow.scale.set(e.target.value, e.target.value, e.target.value);
            });
        };

        function navigate(dir) {
            if (isAnimating) return;
            const next = current + dir;
            if (next < 0 || next >= SCENES.length) return;
            isAnimating = true;
            const oldG = planetGroups[current];
            const newG = planetGroups[next];
            newG.visible = true;

            gsap.to("#pinfo", {
                opacity: 0, x: -20, duration: 0.4, onComplete: () => {
                    updateInfo(next);
                    gsap.to("#pinfo", { opacity: 1, x: 0, duration: 0.8 });
                }
            });

            gsap.to(["#pname", ".scroll-hint"], {
                opacity: 0, y: 15, duration: 0.4, onComplete: () => {
                    gsap.fromTo(["#pname", ".scroll-hint"], { opacity: 0, y: -15 }, { opacity: 1, y: 0, duration: 0.8 });
                }
            });

            oldG.children.forEach(obj => {
                if (obj.name === "planet_glow") gsap.to(obj.material.uniforms.opacity, { value: 0, duration: 1.5 });
                else gsap.to(obj.material, { opacity: 0, duration: 1.5 });
            });

            newG.children.forEach(obj => {
                if (obj.name === "planet_glow") gsap.to(obj.material.uniforms.opacity, { value: 0.4, duration: 1.5 });
                else gsap.to(obj.material, {
                    opacity: 1, duration: 1.5, onComplete: () => {
                        if (obj.name === "planet_body") { oldG.visible = false; current = next; isAnimating = false; }
                    }
                });
            });
        }

        window.addEventListener('wheel', (e) => {
            if (Math.abs(e.deltaY) > 5) navigate(e.deltaY > 0 ? 1 : -1);
        }, { passive: true });

        document.getElementById('scaleRange').oninput = (e) => planetGroups.forEach(g => g.scale.set(e.target.value, e.target.value, e.target.value));
        document.getElementById('yRange').oninput = (e) => planetGroups.forEach(g => g.position.y = e.target.value);
        document.getElementById('glowRange').oninput = (e) => planetGroups.forEach(g => {
            const gl = g.children.find(c => c.name === "planet_glow");
            if (gl) gl.scale.set(e.target.value, e.target.value, e.target.value);
        });

        function animate() {
            requestAnimationFrame(animate);
            planetGroups.forEach(g => { if (g.visible) g.rotation.y += 0.0006; });
            renderer.render(scene, camera);
        }
        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
